body:
  text: 門人廣和記録康熙三十三年九月二十一日進院即日當道衆紳襟護法並本山諸耆德請師升座僧問德藏名剎特峙東湖懸花雨之舊亭存松風之遺跡和尚到來如何是重整一句師云萬象盡含新進云高提祖印棒喝交馳不涉二途又作麼生師打云者棒要你喫進云可謂掀翻大地函蓋乾坤師云你試掀翻看僧擬議師便打鄭居士問古剎重興新得運今朝扶起破砂盆此則且止如何是德藏境師云殿閣甚巍峨士云如何是境中人師云居士來問話士云如何是人中意師云問得甚分明士禮拜師云如何是你腳跟下一句士云步步不離師乃揮拂云幽栖養拙寄龍山永日寥寥萬境閒自笑蒲團無定力又隨台命到人間既到者裡回避無門十字街頭打開布袋合水和泥七穿八穴若是向上提持向山僧未升座以前會取去稍有衲僧氣息其或未然且向第二頭打葛藤去也當湖勝境素稱善邦士庶傾誠咸欽佛化德藏名藍唐朝建蹟老松風中興道場先法叔載振法窟山僧菲才繼其高躅幸逢台護興崇兼諸耆德輔贊不敢另展風規別資玄妙單提向上一著貴要流通正眼即今現前緇素人人頂𩕳上放大寶光個個腳踏實地輝天鑑地者段光明各各直下證取歸家穩坐且到家一句作麼生道驀豎拂云全憑者點無私力仰祝吾皇憶萬年復舉王常侍到臨濟至僧堂前問云者一堂僧還誦經麼濟云不誦經侍云還參禪麼濟云不參禪侍云既不誦經又不參禪畢竟教他作甚麼濟云一個個教他成佛作祖去侍云金屑雖貴落眼成翳濟云將謂你是個俗漢師云常侍煆過精金臨濟寶劍在握一挨一拶逾見光生今日諸位台護臨筵衆僧雍然在座相見不措一辭須知早已話墮且道節文在甚麼處知音不在頻頻舉達者須知暗裏驚卓主杖下座結制持直監院領衆居士設齊請升座問結制開爐諸方舊例德藏門下如何施設師云一棒一條痕進云眉間寶劍袖裡金錘銅頭鐵額一錘粉碎未審無眼耳鼻舌身意底如何煆煉師云識得你了也進云今日現前大衆個個入聖超凡去也師云你腳跟下作麼生進云金鑱影下翻身轉直踏毗盧頂上行師云且緩緩問選佛場開凡聖交參人天瞻仰請師示師便打進云除卻棒喝請師別道師云將謂別有那進云利生之句蒙師示向上宗乘事若何師云腳跟下會取進云漕溪一脈傳千古平江萬派盡朝宗師云瞻仰有分乃云德藏今朝事不同新開爐韝力施功山僧應有鉗錘別要逼生蛇化活龍諸兄弟剔起眉毛看取火色不假一錘現成公案一錘便就平地青霄總不恁麼天上天下性燥漢子聞恁麼道直下承當多少省力若是頑銅鈍鐵爐錘之下未解翻身停機佇思早已鈍置須向九旬期內密用功夫三七日中頻加煆煉且功力俱到一句作麼生曆盡三冬節寒梅自吐香下座佛成道日本寺各房衆師設齊請上堂問昨夜黃面老子見個甚麼道理便恁麼道師豎拳云秪得者個進云今朝和上見個甚麼道理便恁麼斷師云也秪得者個進云恁麼則獅子還生獅子兒師云切莫亂塗糊進云大衆沾恩讚歎去也師云知恩即得問昨夜惡風攪乾坤今朝日午打三更如何是世尊不傳迦葉不聞的消息師良久進云未離兜率已降王宮未出母胎度人已畢因甚又入雪山六年師云知恩者少進云秪如當時睹明星悟個甚麼師云者柄拂子三錢銀子買得進云即今某甲掀倒禪床喝散大衆且道和上今日說個甚麼法師便打進云等閒坐斷千差路從教何處不光輝師微笑乃云一念回機便同本得豁開兩眼青天白日迷個甚麼悟個甚麼夜睹明星一翳在眼奇哉奇哉空花亂墜一切衆生誰是衆生者皆具如來智慧德相切忌錯安名皆因妄想執著而不證得震聲一喝云二千年前若得者一喝截斷葛藤免見相襲至今後代兒孫簸土揚塵無有了日大衆還知得者一喝落處麼若知得落處則德藏寺裡諸位耆德人人頂天立地個個超宗越格便恁麼去彼既丈夫我亦爾不向如來行處行其或未然尋常夜夜明星現切忌抬眸打失睛下座持直監院領金明侯居士等請上堂問楖栗橫拈打開祖師關捩如何是橫拈楖栗句師云突出難辨進云金鎞倒握截斷衲僧命根如何是倒握金鎞句師云坐斷舌頭進云無文印子從空掛鶻眼龍晴覷不能師云覷著則瞎進云只如衆居士將鐵釘飯塞衲僧肚皮明甚麼邊事師云喫了飽不饑進云恁麼則三眼波斯吞露桂金剛含笑嚼須彌師云惜取舌頭乃云目前無法門前雙塔子意在目前大地絶形蹤不是目前法四顧晴光溢目非耳目之所到聞見甚分明直得乾坤覆載不得遍界迥絶囊藏頭頭彰衲僧巴鼻處處顯佛祖真機拈來便用著著具全提作略逴得便行步步有通天活路生殺臨時縱奪自在所以若緇若素莫不承此個恩力為四生津濟作九有梯航可以易短劫為長劫可以轉禍祟為禎祥可以祈嗣胤獲麟瑞可以為植福之弘基慶無不功超萬德有如是殊勝如是奇特且畢竟功歸何所長憶江南三月裡鷓鴣啼處百花香下座佛誕日成山羅居士設齊兼日珠耆德送新道袍請上堂師云未離兜率降王宮花發茶處處紅未出母胎度人畢緑樹黃鸝啼不輟若謂瞿曇今日生空花眼裏亂紛紛若道瞿曇雙樹滅靈利衲僧猶未瞥撥開生滅覓瞿曇錯過瞿曇落二三雲門一棒較些些自古風流出當家山僧撿點將來者一棒知他打得著打不著有甚憑據爭似成山羅居士飯僧請法信殷勤山僧著起新袍服也勝青州衫七斤且慶賀聖誕一句又作麼生道一輪杲日輝今古萬里晴空絶是非不二知浴領陸府張太夫人壽誕設齊請上堂問是非人我拈卻一邊如何是衲僧正因師云頭頂天腳踏地進云滅卻貪嗔癡虛空無罣礙此猶是學人行履如何是到家極則句師云舌頭不出口進云莫怪渠儂多意氣他家曾踏上頭關師云那裡是你踏著底僧頓足一下便喝師云且緩緩乃云榴火初紅薰風扇物萬境森然真機溢目直下了然覿體無間當陽不昧洞徹古今目前一一透露自然頭頭顯現所以釋迦老子降生目顧周行指天指地莫非發明此個端倪以此植福福海淵深以此釋愆雪清冤業以此祝壽壽山益峻直得千祥駢至萬善咸臻得恁麼天然奇特受用自在且必竟因何而至莫怪渠儂多意氣他家曾謁聖明君下座滿七小參三七功圓千戈頓息各各歸家田地穩密若是向上一路直須更進一步且如何是向上一路蝦蟆跳上梵天蚯蚓驀過東海解制小參師云於其結也九旬期內壁立萬仞行是行坐是坐個個身心同達磨喫茶打濕嘴唇皮摸著鼻孔下頭大於其解也八字打開平生慶快住便住去便去頂門有眼人人具腳頭腳底總春風魔宮虎穴恣遊戲惟有山僧主杖子結也結他不著解也解他不著拈來覿體光生放下歷歷落落有時扶我下階墀步步咸承渠恩力卓主杖起身住嘉興石門縣福嚴禪寺語録師受當道衆搢紳護法并則峰法兄和尚遺書洎兩序耆舊請於十月十一日進院即日鄭沈曹三護法設齊請上堂至法座前師拈疏云衲僧家因甚被者道符子勾遣若向個裏委悉得去如龍得水似虎靠山其或未然請為道破宣疏畢指法座云盡大地是個華王座教啓上座又向甚麼處登顧左右云大家著眼便升拈香云此一瓣香千聖同源萬靈共轍拈起也光透九天放下也寧靜四海端為祝延今上皇帝聖壽萬歲萬歲萬萬歲伏願金輪永御寶祚彌昌聖明同日月睿算等乾坤次拈香云此一瓣香奉為滿朝文武闔邑當道紳襟列位尊官護法永為皇家柱石恆作佛法金湯復拈香云此一瓣香超啓自十七歲時向秦郵天王禪床角頭覷著末後撞著個不近人情老漢一槌擊碎直得空勞勞地無耙握處于無把握處拈出供養中興翔鳳資福次住即此堂上傳臨濟正宗第三十二世上靈下機觀老和尚用酬法乳之恩斂衣就座西堂契微白槌云法筵龍象衆當觀第一義師云語水垂鉤貴釣巨鰲衆中還有透網金鱗麼試出來𨁝跳看問和尚云空勞勞無把握如何是無把握句師云山僧到者裡無開口處進云昨日嘉禾今日語溪未審昨日的是今日的是師云坐斷兩頭看進云如何是坐斷處師卓主杖進云學人禮拜去也師云禮拜即得乃云自愧年來被業牽頻經符使席三遷如今多病渾無力鈯斧還開祖父田既爾時節奏遇事非強為于回避不及處直下承當仗師翁光明幢子鼓弄一上去昔日五祖演和尚云山前一片閒田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風咄五祖老漢者片祖翁田地忘卻了多時以致臨風叉手特地沉吟我福嚴者片田地先師翁重勳開化之洪模諸伯叔遞代振興之覺地則法兄承先啓後歷艱持危守成有在纖芥無遺界至分明處處炳然蒼松疊翠古徑幽閒一段真風堂堂不昧勸農橋下流水潺湲顯發師翁妙旨天山巖畔竹影搖空揭示衲僧巴鼻超啓到者裡公案現成勿須叮嚀問主一一無非自家活計頭頭總是受用境界且端拱樂業一句作麼生道拈起一枝無孔笛大家吹出樂升平結槌云諦觀法王法法王法如是下座次晚小參師云啓上座入院來兩日了佛法二字不敢措辭何故有先師翁為汝諸兄弟塵說剎說熾然說無間歇今忽到者裡忍俊不禁一腳踢翻勸農橋一拳拳倒天中山不是兒孫彰意氣要與師翁逞頭地卓拄杖起身結制上堂師云衲僧行履灑灑落落縱奪自由通身作略一切處意氣全彰拶著時露出手腳踢倒五須彌掀翻四大海大地沒纖毫處處絶安排到者裏說甚九旬結制三七施工總是無繩自縛漢山僧恁麼道倘或遲遲有個方便教諸兄弟直下透脫去遂擲拄杖下座上元解制上堂師以拄杖畫相云九十日前汝等諸人總跳不出欲住不寧要去不得幾被者個縛殺復以拄杖畫一畫云山僧今日一時畫破了也一任諸人去留自在南天台北五臺直得燈籠放光露柱喝采拄杖子忍俊不禁驀地𨁝跳觸倒須彌山掀翻四大海驚起海底龍王傾出七珍八寶汝等諸人須好看山僧只得合掌云稽首拄杖子神通何亦爾我見燈明佛本光瑞如此卓拄杖下座佛歡喜日石攻方居士請上堂師揮拂子云一毫頭上薦得萬英叢裡稱尊高超物表獨露乾坤所以道天人群生類悉承此威力秪為衆生瞥爾情生輪回不輟六道殊途四生異轍報有精粗辛酸苦惱今日乃諸佛歡喜之辰衆僧自恣之日我石攻方居士敦請山僧升于此座闡揚大法頓令存沒均沾法益遂擊拂子云一擊心空及第歸頓超直入如來地復舉調達謗佛生陷地獄佛遣阿難往問汝在地獄中安否調達云我在此中如三禪天之樂阿難云汝思出地獄否調達云待世尊入地獄我方出地獄阿難云佛乃三界大師安有入地獄分調達云佛既無入地獄分我豈有出地獄分師云調達可謂大冶精金試聽山僧頌出安身自有法地獄勝三禪鑊湯無冷處火裡綻青蓮揮拂子下座結制當湖趙正言居士法名明道同室人王氏法名明祥送佛至山請上堂師云有佛處不得住福嚴今日剛結制無佛處急走過九旬期內親覷破釋迦老子來也覿面好與一吐乾矢橛一捏粉碎通身暢快麻三斤直下斬斷免見葛藤到者裡說甚僧袛行滿然後成佛三七施功方言悟道所以云大千沙界海中漚一切聖賢如電拂咄復舉城東老母與佛同生不欲見佛忽遇佛來即便回避以手掩面十指掌中俱皆是佛師云城東老母太煞無大人相爭似我明道明祥二道人造佛裝金香花燈燭種種供養迎送至福嚴者裡永永奉供以為不朽且道與他城東老母還有優劣也無試聽山僧判斷一上一人只知有己不知有人一人只知有人不知有己忽然人己兩忘二俱頂天立地卓主杖下座解制湖州府范永生居士設齊請上堂師云突出一句迥絶淆訛明如杲日寬若太虛歷劫難磨古今不昧大丈夫漢拈得便用權衡在握生殺全施與奪自由縱橫無礙所以今日我永生居士以此營齊飯僧延增福壽功裕嗣胤慶無不吉且應時即境一句又作麼生道一天雲淨含春象萬里晴空絶是非下座對機僧問如何是學人本來面目師云十字街頭石敢當僧禮拜師云會麼僧云不會師云切忌磕著撞著僧問選佛場中有幾人超宗越格師云獨汝無分僧云為甚麼師云鈍置衲僧僧便喝師便打僧問雜念紛紛時如何師云雜念紛紛從甚麼處起僧擬議師便打復問衆云雜念紛紛時如何一僧云識得不為冤師云觀世音菩薩將錢買胡餅放下手因甚卻是饅頭僧無語師云又不識得了也僧問一拳拳倒黃鶴樓一踏踏翻鸚鵡洲為是神通妙用是法爾如然師云也不是神通妙用也不是法爾如然僧云畢竟如何師便打僧問不知將甚麼喚作話頭師云你問底是甚麼僧云一火燒卻時如何師云露僧便禮拜師云露底是個甚麼僧便喝師便打僧問學人還有藏身處麼師云露僧問盡大地是藥那個是自己師云卻被一莖藥蓋卻僧問如何是父母未生前本來面目師云惜取舌頭僧問天上月正圓因甚人間道月半師云兩個五百原是一貫落堂問僧正當恁麼時如何僧云雲開月現師云月聻僧喝師云好好問你因甚喝僧擬議師便掌問行堂你是那裡人僧云江北師云揚子江作麼生得過僧云有甚隔礙師云盞子撲落地碟子成七片意旨如何僧無語師云莫道無隔礙好落堂經行次把住一僧云有一事相借問得麼僧喝師云好好借問為甚便喝僧擬議師便掌少停坐定師云山僧適來好好借問那僧被伊一喝一僧胸中甚是不甘衆中還有為山僧出氣者麼衆佇思師震聲一喝而出師睡次與夔書記問法華云是法非思量分別之所能解畢竟作麼生會師云卻值山僧打睡夔佇思師云汝又作麼生會夔云動容揚古路不墮悄然機師頷之七期落堂問與夔云本有之事為甚費者許多生受夔云從前汗馬無人識秪要重論蓋代功師云通身血汗師問與夔云盡大地是山僧汝向甚麼處著足夔云和尚不得打作兩橛師云如何是你一橛底夔云落霞與孤鶩齊飛秋水共長天一色師云大好一片景日初禪人瞻禮老和上像師指真云你認得者老漢麼初云未到楊墳早已識得了也師云你道他是何面目初便喝師云我問你是何面目為甚麼喝初禮拜師便喝題贊初祖像讚十萬迢迢過大梁曾將不識惱君王如今尚在秋江上一葦何時到魏邦題青山和尚像踏翻閩海天撈得禺泉月鑿破青山雲浡興猛虎穴一瓶岩壑心十載冰霜骨素心付煙霞襟懷似兀兀贏得清風啓後先葆林千古規芳躅題利禪和上像禺山唱道令全施打落天邊俊鶻兒佇看飛騰能變化翻雲覆雨在臨時又掬得禺泉一勺水胥江激起萬尋濤棒頭點出龍門子也解潑天弄巨潮自題像讚淮水逆流特出者漢曾經大地平沉徹底家私盡蕩空勒雙拳在握覿面當機不讓兩開祖父藥鋪單賣死貓頭慣性情觸著如雷無人湊泊得上惡聲遍布寧區聞者非非而謗恁般無德長老阿誰描他供養且喜與禪諳此機電光影裏薦其半鉢帶拈來分付伊他年莫負老夫望題祕含禪人行樂圖懸岩之下坐忘情手握輪珠花雨新山色溪聲能瞥地大千沙界現全真題純修陸居士行樂圖高山流水白雲中散服科頭太古風長嘯豁然開醉眼方知物外有純翁題廉湖陸護法行樂圖避名巖壑醉煙霞飽玩松山意興賒看到景忘情絶處乾坤笑破總虛華與貞伯任公法名明覺靈山授囑與王臣金臂恆垂衛法門今日任公能力荷曇花又放一枝新題鄭又民居士像者漢能控佛祖機逢人慣弄爪牙威箭鋒頓落懸巖處三十烏藤徹困時化燈油偈者點光明本現成從來生佛不多增全憑智者能挑剔永作凡間破暗燈佛事設先老和尚塔供盡道先師滅度阿誰知他去處不作溈山水牯牛定做楊岐三腳驢遺下未了公案殃及後代兒孫大衆今日合當酬恩因甚說者個話遂插香云超啓所供是實伏惟慈鑒設至邛嵩庵利禪三法兄供同條生死句千聖莫能窺若非三位師兄直得無人委悉雖然且道今日設供燒香意在於何遂插香云如今更勿論孤賒盡在栴檀香一片為則峰法兄和尚設供丹桂香飄梁木忽折非常之哀哭笑不得秪有一句子突出難分別不是法兄和尚在今無人委悉拈來置向尊前伏惟冥中鑒格大衆且道是那一句語水聲中流不盡天山作舌也難宣東蓮老和尚訃至設供昨日登高節黃花香拍鼻忽然報到來東蓮老人滅細雨灑寒空天地慟相泣寥寥面壁風大法將誰賴雖然且道即今設供燒香還來鑒格也無若道不來卻成虛設若道來以何為驗遂以手椎胸云換手椎胸意惘然輸誠惟把旃檀熱資福明心和尚訃至設供師云同聲相應同病相憐兄退資福我辭福嚴死生雖異其理一焉金鳳衝開霜夜月雁行愁斷小陽天愚山和尚封龕師云嶺上寒梅香正發象王擺斷黃金索轉機北斗解藏身空裡猶聞普化鐸恭惟愚翁法兄和尚道唱東明單提向上一關化行清邑揭示衲僧巴鼻生殺全施縱擒自在湖海浩歸象龍擁座興菩薩慈為衆彌篤特建寶坊水雲得惠臘長諸方德尊寰宇不忝為老福嚴之真孫先法伯之嫡胤可謂天山益峻滹沱漲流忽爾移星換斗別轉化輪獅子迷蹤人天罔測且道即今潛機密用一句作麼生道當軒大坐絶中偏千聖到來難辨的為燦衲法兄掩龕拈得先師鈯斧青山劈草除荒竭力獨開生面荊棘化成寶坊諸行刻志身先率衆厚德謙光動履不落時轍濟物道出尋常可謂起翔鳳嘉聲挽末法頽綱正冀砂盆永賴匡扶何期遽然別展旗鎗至今小弟孤掌難鳴雁不成行雖然秪如今日化緣告畢四衆瞻仰末後全提一句又作麼生道坐斷十方誰辨的一輪杲日照當陽送則峰和尚靈龕歸楚設供拈香云暑日炎炎獨送程瓣香杯茗致殷勤個中千里同風句楚水吳山月一輪插香便拜化城庵行廣遠塵二比丘尼靈骨入塔二禪德還會否剛離化城頓歸寶所一對鴛鴦畫不成個中端的難分剖難分剖試看末山不露頂遂送入佛音禪德請為父母靈骨入塔師以杖指骨云者是優婆塞那是優婆夷夫婦偕到斯各請歸寶所遂送入云個中一句絶安排坐看山花紅朵朵介千師請為先慈明修尼靈骨入塔師舉骨云閲世八十一載幻緣頓爾俱拋育得獨角麟兒編蒲聲價彌高涅槃生死兩途迥脫赤體條條勿自藏身北斗愛聽翔鳳松濤覷破趙州那一掐全身放下萬機消便送入純如師火翔鳳嶺頭濕雲黯黯薰風天際梅雨霏霏會得目前無異法頭頭盡是出身機且作麼生是出身機蛙鼓池塘鳴未已又聞啼鳥隔峰西權實巡照火山門頭佛殿後到處經巡東廊上西廊下左右觀照三板鳴四板嚮椎下分明客來看賊來打隨機得妙此是上座尋常照察邊事秪如權實並行一句作麼生道攛火炬云烈焰堆頭飛鐵鷂自真禪師入塔竭盡身心精勤志篤護惜招提肘無外曲煉得者些兒堅密如金玉到頭雲定覓山歸無縫塔中深藏畜遂入骨云十方坐斷露全提亙古青山輝杲旭香燈火惟斯者著子觸處分明極焚香擇火不曾違生死去來無間隔雖然秪如燈花爆時又是個甚麼消息夜來一陳雨滂沱大地山河盡改色明慧老宿火生本三湘瞻風雨浙一卷金剛常轉不輟齒德可稱叢林敬悅今朝坐斷萬緣時生死涅槃都不涉且道明慧老師即今在甚麼處連宵不斷黃梅雨點滴分明俱漏泄慧國禪師火篤志已射芒鞋不惜兩登鳳山貴圖決擇為護叢林傾誠竭力無端更轉別峰機一片道心無變易慧禪德且作麼生是無變易底心啓上座即今為你指出看取獅子峰亙古常突兀便燒四儀禪人火吳中山廣陵水登涉分明自家底今朝直下歇馳求一曲歌來還舊里秪舊里一曲作麼生唱擲炬云倒騎白鶴上揚州笑看瓊花秋色裡上求新戒火戒品方登皎如冰雪撩起便行得大解脫翻身火裏露全軀生死涅槃俱超越擲火炬云咦心榮火頭火終日只知燒火誰知惹火燒身直須皮膚落盡自然迥脫根塵且道迥脫後如何八月連宵雨滿溪流水聲還空禪德火桂子香飄八月天歸家踏斷嶺頭煙個中一句無多子始信還空事宛然且作麼生是宛然底意萬壑松聲常在耳聽來何似響流泉慧國禪師火天色將初夜星稀月朗時目前親會得為發轉身機且作麼生是轉身機擲下火炬云識得丙丁元是火鑊湯爐炭不相違文璧禪師請為息二剃度師六七之辰起棺六七日中萬機頓息坐斷十方惟契不二今朝正是轉身時兜率人間隨所至便以杖引出入塔翠竹森森黃花鬱鬱塔戶洞然開請公親造入遂進骨云個中一念萬年時正好舉頭看紅日百川知客火撥草瞻風貴明者著妙用頭頭何曾晦卻客來看賊來打見得分明迎賓處打躬時通身顯露雖然此猶是上座親知識輔叢林底用秪如今日萬機寢息歸源得旨一句又作麼生道攛火炬云萬派聲歸海百川絶異流瞿堂禪人火撥草瞻風出嶺南百城煙水太漫漫三千里外知端的腳下明明是故山秪如故山一句作麼生道歸去踏翻梅嶺月清光爍破髑髏寒巨量老宿靈骨入塔別卻獅山舊隱處轉身愛向普同藏白雲坐斷無今古樂樂時聞花雨香遠生智慧了明蘊白四老宿靈骨入塔以杖指骨云即此物非他物是四上座之本得烈焰曾經煆一回堅密身心如金玉大千沙界莫能收藏身秪有者一隙復以杖約骨云者且止既是同到這裏因甚卻分門而入直下若明宗正眼自然個裡知端的便送入時津師靈骨入塔捧骨云大千俱壞者個不壞親煆一回通身慶快珍藏岩谷不知春無影樹下常自在匡濟禪宿火別卻河南路踏翻兩浙天一身輕似葉頭角自昂然先師會裏道價聲重鹿城十載白業彌堅今日末後全提纖毫不立坐斷千差人天罔測啓上座到來更為通個消息攛炬云寒崖重發焰火內綻青蓮楊燕貽居士請為亡室章氏下火師云鶯啼柳外花笑巖前明明彰般若境界的的露本來面目章氏淑人直下恁麼見得徹去生死窟宅立地掀翻愛網情關頓然解脫坐斷男女之相逍遙兜率人間須知更有轉身一路山僧即今特為發機擲下火炬云勝熱門大啓優曇火裡開朱同一護法等請為超薦水溺孤魂師云瞥爾情生識浪高相牽淪溺莫能超今朝一念回機去妄見狂波當下消喝一喝當湖任捕廳請為橋下妖石說法爾乃何類之精靈附物興妖而作祟喝一喝云今朝喝下快翻身頓然解脫超升去
