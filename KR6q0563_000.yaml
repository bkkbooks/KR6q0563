front:
  text: 祖亮啓禪師語録序自大聖已還拈花微笑之旨弘傳迄今二千七百有餘載其間得大機用具正知見説法如雲若雨者又奚啻龍驤虎驟哉我祖亮法兄英年悟證親入揚墳靈機老人之室厥後四坐道場浩歸湖海其赤手提持惟以向上一著機語峻拔衲子敬畏每於鉗錘之下透脫見聞者不知其幾幾嗣法弟子澗石豫揆尤龍象之最著者揆識卓才優繼述有志然卒以數奇不獲展其驥足回首之日惟切切以未刻師語録為念乃以其遺稿囑同參素嚴丐余作序壽梓流通法眼嗚呼揆可謂重其道而孝其師已雖死猶生余雖不敏為片辭以揄揚其大略焉時康熙四十年孟夏蓂生莢之四日普明法弟超嶼題
